name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute owner (lowercase)
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/steno10k:${{ github.ref_name }}
            ghcr.io/${{ steps.vars.outputs.owner }}/steno10k:latest
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
      - name: Prepend release notes to CHANGELOG on main
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          # Curated entries win: if CHANGELOG already documents this version
          # (e.g. a hand-written `## [1.0.0]` section), leave it untouched.
          if grep -qE "^## \[?${VERSION}\]?( |$|])" CHANGELOG.md; then
            echo "CHANGELOG already has a section for ${VERSION}; skipping auto-prepend."
            exit 0
          fi
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          RANGE="${PREV:+$PREV..}${TAG}"
          NOTES=$(git log --pretty=format:'- %s' "$RANGE")
          {
            echo "# Changelog"; echo
            echo "## ${{ github.ref_name }} - $(date +%Y-%m-%d)"; echo
            echo "$NOTES"; echo
            tail -n +2 CHANGELOG.md
          } > CHANGELOG.new && mv CHANGELOG.new CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: changelog for ${{ github.ref_name }} [skip ci]" || exit 0
          git push origin HEAD:main || echo "changelog push skipped (branch protection)"
